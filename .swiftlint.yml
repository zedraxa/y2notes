# SwiftLint Configuration for Y2Notes
# https://github.com/realm/SwiftLint
#
# Run:  swiftlint lint --config .swiftlint.yml
# Fix:  swiftlint lint --fix --config .swiftlint.yml

# ── Paths ─────────────────────────────────────────────────────────

included:
  - Y2Notes

excluded:
  - DerivedData
  - build
  - .build
  - Pods
  - Y2Notes.xcodeproj

# ── Enabled Rules ─────────────────────────────────────────────────

opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - vertical_parameter_alignment_on_call
  - yoda_condition

disabled_rules:
  - todo                                  # Allow TODO/FIXME during development
  - trailing_comma                        # Style preference — we allow trailing commas
  - opening_brace                         # Can conflict with multiline closures

# ── Rule Configuration ────────────────────────────────────────────

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true
  ignores_interpolated_strings: true

file_length:
  warning: 600
  error: 1200
  ignore_comment_only_lines: true

type_body_length:
  warning: 400
  error: 800

function_body_length:
  warning: 80
  error: 150

function_parameter_count:
  warning: 7
  error: 10

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60
  excluded:
    - ID
    - FX

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - z
    - w
    - h
    - i
    - r
    - g
    - b
    - a
    - tx
    - ty
    - fg
    - bg
    - fx

nesting:
  type_level: 3
  function_level: 5

cyclomatic_complexity:
  warning: 15
  error: 25

large_tuple:
  warning: 4
  error: 6

multiline_arguments:
  only_enforce_after_first_closure_on_first_line: true

vertical_whitespace:
  max_empty_lines: 2

force_cast:
  severity: warning

force_try:
  severity: warning

# ── Custom Rules ──────────────────────────────────────────────────

custom_rules:
  no_print_statement:
    name: "No print() in production code"
    regex: "\\bprint\\s*\\("
    message: "Use os_log or Logger instead of print() for production logging."
    severity: warning
    match_kinds:
      - identifier

  no_hardcoded_color:
    name: "Prefer Color(uiColor:) over Color.init(red:green:blue:)"
    regex: "Color\\(red:\\s*[0-9]"
    message: "Prefer using Color(uiColor:) or theme-based colours for Dark Mode support."
    severity: warning
