workflows:
  ios-testflight-workflow:
    name: iOS TestFlight Distribution
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Y2Notes App Store Connect
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.y2notes.app
      vars:
        XCODE_PROJECT: "Y2Notes.xcodeproj"
        XCODE_SCHEME: "Y2Notes"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for App Store distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="-destination 'generic/platform=iOS'"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - user1@example.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
