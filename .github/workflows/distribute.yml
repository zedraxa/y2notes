name: Sign, Build & Distribute

# Triggered on version tags (e.g. v1.2.3) and manual dispatch.
# Required repository secrets:
#   BUILD_CERTIFICATE_BASE64       – Base64-encoded Apple Distribution certificate (.p12)
#   P12_PASSWORD                   – Password for the .p12 file
#   BUILD_PROVISION_PROFILE_BASE64 – Base64-encoded App Store provisioning profile (.mobileprovision)
#   KEYCHAIN_PASSWORD              – Password used for the ephemeral build keychain
#   DEVELOPMENT_TEAM               – Apple Developer Team ID (e.g. ABCDE12345)
#   ASC_API_KEY_BASE64             – Base64-encoded App Store Connect API key (.p8)
#   ASC_API_KEY_ID                 – App Store Connect API key ID
#   ASC_API_ISSUER_ID              – App Store Connect API issuer UUID

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  distribute:
    name: Archive · Sign · TestFlight
    runs-on: macos-14
    environment: testflight

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Xcode ─────────────────────────────────────────────────
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app \
            || sudo xcode-select -s /Applications/Xcode.app

      # ── Build number ──────────────────────────────────────────
      - name: Set build number
        run: agvtool new-version -all ${{ github.run_number }}

      # ── xcpretty ──────────────────────────────────────────────
      - name: Install xcpretty
        run: gem install xcpretty --no-document

      # ── Code signing: certificate ─────────────────────────────
      - name: Import distribution certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # ── Code signing: provisioning profile ────────────────────
      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          mkdir -p "$PROFILES_DIR"

          UUID=$(security cms -D -i "$PROFILE_PATH" \
            | plutil -extract UUID raw - \
            | tr -d '[:space:]')
          cp "$PROFILE_PATH" "$PROFILES_DIR/$UUID.mobileprovision"
          echo "PROFILE_UUID=$UUID" >> "$GITHUB_ENV"
          echo "Installed provisioning profile: $UUID"

      # ── DerivedData cache ──────────────────────────────────────
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: dd-dist-${{ hashFiles('Y2Notes.xcodeproj/project.pbxproj') }}
          restore-keys: dd-dist-

      # ── Resolve packages ──────────────────────────────────────
      - name: Resolve SPM packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Y2Notes.xcodeproj \
            -scheme Y2Notes

      # ── Archive ───────────────────────────────────────────────
      - name: Build archive
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          xcodebuild archive \
            -project Y2Notes.xcodeproj \
            -scheme Y2Notes \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Y2Notes.xcarchive" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            | xcpretty && exit ${PIPESTATUS[0]}

      # ── Export IPA ────────────────────────────────────────────
      - name: Write ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
              "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Y2Notes.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            | xcpretty && exit ${PIPESTATUS[0]}

      # ── Upload to TestFlight ──────────────────────────────────
      # xcrun altool --upload-app is deprecated in Xcode 14+ but remains
      # functional in Xcode 15 and is the only headless iOS upload option
      # available on GitHub-hosted runners (notarytool is macOS-only;
      # Transporter has no supported CLI interface).  Replace with the
      # App Store Connect API (via curl or a 3rd-party action) once Apple
      # provides a supported CLI successor.
      - name: Upload to TestFlight
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          ASC_KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$ASC_KEY_DIR"
          echo -n "$ASC_API_KEY_BASE64" | base64 --decode \
            -o "$ASC_KEY_DIR/AuthKey_${ASC_API_KEY_ID}.p8"
          chmod 600 "$ASC_KEY_DIR/AuthKey_${ASC_API_KEY_ID}.p8"

          IPA=$(find "$RUNNER_TEMP/export" -name '*.ipa' | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID"

      # ── Artifacts ─────────────────────────────────────────────
      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Y2Notes-${{ github.run_number }}.ipa
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30

      - name: Upload dSYMs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Y2Notes-${{ github.run_number }}.dSYMs
          path: ${{ runner.temp }}/Y2Notes.xcarchive/dSYMs
          retention-days: 30

      # ── Cleanup ───────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
